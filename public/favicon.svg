<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark Background -->
  <rect width="100" height="100" rx="16" fill="#17181d"/>
  
  <!-- Three Building Blocks - Rising (Growth/Progress) -->
  <!-- Block 1 (smallest, left) -->
  <rect x="18" y="58" width="20" height="24" rx="3" fill="#fdf153"/>
  
  <!-- Block 2 (medium, center) -->
  <rect x="40" y="42" width="20" height="40" rx="3" fill="#fdf153"/>
  
  <!-- Block 3 (tallest, right) -->
  <rect x="62" y="26" width="20" height="56" rx="3" fill="#fdf153"/>
  
  <!-- Subtle detail lines on blocks -->
  <rect x="22" y="62" width="12" height="2" rx="1" fill="#17181d" opacity="0.3"/>
  <rect x="44" y="46" width="12" height="2" rx="1" fill="#17181d" opacity="0.3"/>
  <rect x="66" y="30" width="12" height="2" rx="1" fill="#17181d" opacity="0.3"/>
</svg>
